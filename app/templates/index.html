<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UBTI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>

<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <div class="brand-eyebrow">Enterprise Console</div>
        <h1>UBTI AI Powered Assistant</h1>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="new-chat" class="btn btn-ghost">New Chat</button>
      <div class="status-pill">Connected</div>
    </div>
  </header>

  <main class="workspace">
    <aside class="sidebar">
      <div class="panel-header">
        <h2>Chat History</h2>
        <p>Project threads • Past responses</p>
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <section class="chat-area">
      <div id="chat-title" class="chat-title">Select a chat to begin</div>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-form">
        <textarea id="message" rows="3" placeholder="Ask anything — analysis, summary, evaluation, code review…" required></textarea>
        <div class="form-actions">
          <button type="submit" class="btn" style="background:var(--accent); color:white; padding:0.7rem 1.5rem;">Send</button>
          <span id="status" style="color:var(--text-muted); font-weight:500;">Ready</span>
        </div>
      </form>
    </section>

    <aside class="control-panel">
      <div class="block">
        <h3 style="margin-bottom:0.75rem;">Knowledge Mode</h3>
        <select id="mode">
          <option value="without_pdf">Pure Chat</option>
          <option value="with_pdf" selected>PDF Mode</option>
        </select>
        <p class="hint">Choose how responses should be grounded</p>
      </div>

      <div class="block" id="upload-block">
        <h3 style="margin-bottom:0.75rem;">Upload Document</h3>
        <input id="file" type="file" accept=".pdf,.ppt,.pptx,.doc,.docx" />
        <div id="upload-status" class="hint">No file selected</div>
      </div>
    </aside>
  </main>
</div>

<script>
const modeSelect = document.getElementById('mode');
const uploadBlock = document.getElementById('upload-block');
const fileInput = document.getElementById('file');
const chatList = document.getElementById('chat-list');
const chatLog = document.getElementById('chat-log');
const chatTitle = document.getElementById('chat-title');
const chatForm = document.getElementById('chat-form');
const messageInput = document.getElementById('message');
const status = document.getElementById('status');
const uploadStatus = document.getElementById('upload-status');
const newChatButton = document.getElementById('new-chat');

let currentChatId = null;

const setStatus = (text) => {
  status.textContent = text;
};

const formatOutput = (text) => {
  if (!text) return '';
  const trimmed = text.trim();
  if (!trimmed) return '';
  try {
    const parsed = JSON.parse(trimmed);
    return JSON.stringify(parsed, null, 2);
  } catch {
    return text;
  }
};

const escapeHtml = (value) => {
  return value
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
};

const renderMarkdownTable = (text) => {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return null;
  const header = lines[0].trim();
  const separator = lines[1].trim();
  if (!header.startsWith('|') || !separator.includes('---')) return null;

  const parseRow = (row) =>
    row
      .trim()
      .replace(/^\|/, '')
      .replace(/\|$/, '')
      .split('|')
      .map((cell) => escapeHtml(cell.trim()));

  const headers = parseRow(header);
  const rows = lines.slice(2).map(parseRow).filter((r) => r.length > 0);

  const thead = `<thead><tr>${headers
    .map((h) => `<th>${h}</th>`)
    .join('')}</tr></thead>`;
  const tbody = `<tbody>${rows
    .map((r) => `<tr>${r.map((c) => `<td>${c}</td>`).join('')}</tr>`)
    .join('')}</tbody>`;
  return `<table class="md-table">${thead}${tbody}</table>`;
};

const renderAssistantContent = (text) => {
  const formatted = formatOutput(text);
  if (!formatted) return '';
  const table = renderMarkdownTable(formatted);
  if (table) return table;
  return escapeHtml(formatted).replaceAll('\n', '<br />');
};

const formatTitle = (value) => {
  const title = (value || 'New Chat').trim();
  if (!title) return 'New Chat';
  return title.length > 32 ? `${title.slice(0, 32)}...` : title;
};

const updateModeVisibility = () => {
  const isPure = modeSelect.value === 'without_pdf';
  uploadBlock.classList.toggle('hidden', isPure);
  fileInput.disabled = isPure;
};

const renderChats = (chats) => {
  chatList.innerHTML = '';
  chats.forEach((chat) => {
    const item = document.createElement('button');
    item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
    item.innerHTML = `
      <span>${formatTitle(chat.title)}</span>
    `;
    item.addEventListener('click', () => loadChat(chat.id));
    chatList.appendChild(item);
  });
};

const renderMessages = (messages) => {
  chatLog.innerHTML = '';
  messages.forEach((msg) => {
    const bubble = document.createElement('div');
    bubble.className = `bubble ${msg.role}`;
    if (msg.role === 'assistant') {
      bubble.innerHTML = renderAssistantContent(msg.content);
    } else {
      bubble.textContent = msg.content;
    }
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = msg.role === 'user' ? 'flex-end' : 'flex-start';
    wrapper.appendChild(bubble);
    chatLog.appendChild(wrapper);
  });
  chatLog.scrollTop = chatLog.scrollHeight;
};

const appendBubble = (role, text) => {
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  const wrapper = document.createElement('div');
  wrapper.style.display = 'flex';
  wrapper.style.flexDirection = 'column';
  wrapper.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
  wrapper.appendChild(bubble);
  chatLog.appendChild(wrapper);
  chatLog.scrollTop = chatLog.scrollHeight;
  return bubble;
};

const fetchChats = async () => {
  const response = await fetch('/api/chats');
  const payload = await response.json();
  renderChats(payload.chats || []);
  if (!currentChatId && payload.chats && payload.chats.length > 0) {
    loadChat(payload.chats[0].id);
  }
};

const createChat = async () => {
  const response = await fetch('/api/chats', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: 'New Chat',
      mode: modeSelect.value,
      context_text: ''
    })
  });
  const payload = await response.json();
  currentChatId = payload.id;
  await fetchChats();
  return currentChatId;
};

const loadChat = async (chatId) => {
  const response = await fetch(`/api/chats/${chatId}`);
  if (!response.ok) return;
  const payload = await response.json();
  currentChatId = payload.chat.id;
  chatTitle.textContent = payload.chat.title || 'Chat';
  modeSelect.value = payload.chat.mode || 'with_pdf';
  updateModeVisibility();
  uploadStatus.textContent = payload.chat.last_upload_name
    ? `Last upload: ${payload.chat.last_upload_name}`
    : 'No file selected';
  renderMessages(payload.messages || []);
  await fetchChats();
};

const sendMessage = async () => {
  if (!currentChatId) {
    await createChat();
  }
  const userText = messageInput.value.trim();
  if (!userText) {
    setStatus('Type a message first.');
    return;
  }

  setStatus('Processing...');
  appendBubble('user', userText);
  const pending = appendBubble('assistant', '...');

  const data = new FormData();
  data.append('input_text', userText);
  data.append('mode', modeSelect.value);
  if (fileInput.files[0] && modeSelect.value === 'with_pdf') {
    data.append('file', fileInput.files[0]);
  }

  const response = await fetch(`/api/chats/${currentChatId}/messages`, {
    method: 'POST',
    body: data
  });

  if (!response.ok) {
    const errorText = await response.text();
    pending.textContent = errorText || 'Request failed.';
    setStatus('Error sending message.');
    return;
  }

  const payload = await response.json();
  pending.innerHTML = renderAssistantContent(payload.output_text) || 'No response.';
  messageInput.value = '';
  setStatus('Ready');
  if (payload.upload_status && payload.upload_status.filename) {
    uploadStatus.textContent = `Uploaded: ${payload.upload_status.filename}`;
  }
  if (payload.chat && payload.chat.title) {
    chatTitle.textContent = payload.chat.title;
  }
  if (payload.messages) {
    renderMessages(payload.messages);
  } else {
    await loadChat(currentChatId);
  }
};

chatForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  await sendMessage();
});

newChatButton.addEventListener('click', async () => {
  currentChatId = null;
  chatLog.innerHTML = '';
  chatTitle.textContent = 'New Chat';
  await createChat();
});

modeSelect.addEventListener('change', updateModeVisibility);
updateModeVisibility();
fetchChats();
</script>
</body>
</html>
