<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UBTI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-dark: #1e40af;
      --radius: 14px;
      --shadow: 0 4px 14px -2px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 700; }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1.75rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(30,64,175,0.22);
    }

    .brand-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .btn {
      border: none;
      border-radius: 9999px;
      padding: 0.6rem 1.3rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover { background: var(--surface-hover); }

    .status-pill {
      padding: 0.45rem 1rem;
      background: rgba(59,130,246,0.1);
      color: var(--accent);
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      border: 1px solid rgba(59,130,246,0.15);
    }

    .workspace {
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      gap: 1.5rem;
    }

    .sidebar, .chat-area, .control-panel {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 { font-size: 1.25rem; margin: 0; }
    .panel-header p  { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.3rem; }

    /* ── Improved Chat History ── */
    .chat-list {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .chat-item {
      padding: 1rem 1.125rem;
      border-radius: 12px;
      border: 1px solid transparent;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .chat-item:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .chat-item.active {
      background: rgba(59,130,246,0.08);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .chat-item span {
      font-weight: 700;
      display: block;
    }

    .chat-item small {
      color: var(--text-muted);
      font-size: 0.82rem;
      display: block;
    }

    .chat-item .meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    /* ── Chat Area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      height: 82vh;
    }

    .chat-title {
      padding: 1.25rem 1.5rem;
      font-size: 1.4rem;
      border-bottom: 1px solid var(--border);
    }

    .chat-log {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .bubble {
      max-width: 82%;
      padding: 1rem 1.25rem;
      border-radius: 18px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .bubble.user {
      background: var(--accent);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .bubble.assistant {
      background: #f1f5f9;
      align-self: flex-start;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 6px;
    }

    .bubble.assistant .md-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .bubble.assistant .md-table th,
    .bubble.assistant .md-table td {
      border-bottom: 1px solid #e2e8f0;
      padding: 0.6rem 0.75rem;
      text-align: left;
      vertical-align: top;
    }

    .bubble.assistant .md-table th {
      background: #eef2ff;
      font-weight: 700;
    }

    .bubble-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    .chat-form {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      resize: none;
      font: inherit;
      background: #fcfdfe;
      min-height: 68px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .form-actions {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Control Panel ── */
    .control-panel .block {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .control-panel .block:last-child { border-bottom: none; }

    select, input[type="file"] {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fcfdfe;
      font: inherit;
    }

    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .hidden { display: none !important; }

    .hint {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 1fr 1fr; }
      .control-panel { grid-column: 1 / -1; order: 3; }
    }

    @media (max-width: 850px) {
      .workspace { grid-template-columns: 1fr; }
      .sidebar { order: 3; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <div class="brand-eyebrow">Enterprise Console</div>
        <h1>UBTI AI Powered Assistant</h1>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="new-chat" class="btn btn-ghost">New Chat</button>
      <div class="status-pill">Connected</div>
    </div>
  </header>

  <main class="workspace">
    <aside class="sidebar">
      <div class="panel-header">
        <h2>Chat History</h2>
        <p>Project threads • Past responses</p>
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <section class="chat-area">
      <div id="chat-title" class="chat-title">Select a chat to begin</div>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-form">
        <textarea id="message" rows="3" placeholder="Ask anything — analysis, summary, evaluation, code review…" required></textarea>
        <div class="form-actions">
          <button type="submit" class="btn" style="background:var(--accent); color:white; padding:0.7rem 1.5rem;">Send</button>
          <span id="status" style="color:var(--text-muted); font-weight:500;">Ready</span>
        </div>
      </form>
    </section>

    <aside class="control-panel">
      <div class="block">
        <h3 style="margin-bottom:0.75rem;">Knowledge Mode</h3>
        <select id="mode">
          <option value="without_pdf">Pure Chat</option>
          <option value="with_pdf" selected>PDF Mode</option>
        </select>
        <p class="hint">Choose how responses should be grounded</p>
      </div>

      <div class="block" id="upload-block">
        <h3 style="margin-bottom:0.75rem;">Upload Document</h3>
        <input id="file" type="file" accept=".pdf,.ppt,.pptx,.doc,.docx" />
        <div id="upload-status" class="hint">No file selected</div>
      </div>
    </aside>
  </main>
</div>

<script>
const modeSelect = document.getElementById('mode');
const uploadBlock = document.getElementById('upload-block');
const fileInput = document.getElementById('file');
const chatList = document.getElementById('chat-list');
const chatLog = document.getElementById('chat-log');
const chatTitle = document.getElementById('chat-title');
const chatForm = document.getElementById('chat-form');
const messageInput = document.getElementById('message');
const status = document.getElementById('status');
const uploadStatus = document.getElementById('upload-status');
const newChatButton = document.getElementById('new-chat');

let currentChatId = null;

const setStatus = (text) => {
  status.textContent = text;
};

const formatOutput = (text) => {
  if (!text) return '';
  const trimmed = text.trim();
  if (!trimmed) return '';
  try {
    const parsed = JSON.parse(trimmed);
    return JSON.stringify(parsed, null, 2);
  } catch {
    return text;
  }
};

const escapeHtml = (value) => {
  return value
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
};

const renderMarkdownTable = (text) => {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return null;
  const header = lines[0].trim();
  const separator = lines[1].trim();
  if (!header.startsWith('|') || !separator.includes('---')) return null;

  const parseRow = (row) =>
    row
      .trim()
      .replace(/^\|/, '')
      .replace(/\|$/, '')
      .split('|')
      .map((cell) => escapeHtml(cell.trim()));

  const headers = parseRow(header);
  const rows = lines.slice(2).map(parseRow).filter((r) => r.length > 0);

  const thead = `<thead><tr>${headers
    .map((h) => `<th>${h}</th>`)
    .join('')}</tr></thead>`;
  const tbody = `<tbody>${rows
    .map((r) => `<tr>${r.map((c) => `<td>${c}</td>`).join('')}</tr>`)
    .join('')}</tbody>`;
  return `<table class="md-table">${thead}${tbody}</table>`;
};

const renderAssistantContent = (text) => {
  const formatted = formatOutput(text);
  if (!formatted) return '';
  const table = renderMarkdownTable(formatted);
  if (table) return table;
  return escapeHtml(formatted).replaceAll('\n', '<br />');
};

const formatTitle = (value) => {
  const title = (value || 'New Chat').trim();
  if (!title) return 'New Chat';
  return title.length > 32 ? `${title.slice(0, 32)}...` : title;
};

const updateModeVisibility = () => {
  const isPure = modeSelect.value === 'without_pdf';
  uploadBlock.classList.toggle('hidden', isPure);
  fileInput.disabled = isPure;
};

const renderChats = (chats) => {
  chatList.innerHTML = '';
  chats.forEach((chat) => {
    const item = document.createElement('button');
    item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
    item.innerHTML = `
      <span>${formatTitle(chat.title)}</span>
    `;
    item.addEventListener('click', () => loadChat(chat.id));
    chatList.appendChild(item);
  });
};

const renderMessages = (messages) => {
  chatLog.innerHTML = '';
  messages.forEach((msg) => {
    const bubble = document.createElement('div');
    bubble.className = `bubble ${msg.role}`;
    if (msg.role === 'assistant') {
      bubble.innerHTML = renderAssistantContent(msg.content);
    } else {
      bubble.textContent = msg.content;
    }
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = msg.role === 'user' ? 'flex-end' : 'flex-start';
    wrapper.appendChild(bubble);
    chatLog.appendChild(wrapper);
  });
  chatLog.scrollTop = chatLog.scrollHeight;
};

const appendBubble = (role, text) => {
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  const wrapper = document.createElement('div');
  wrapper.style.display = 'flex';
  wrapper.style.flexDirection = 'column';
  wrapper.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
  wrapper.appendChild(bubble);
  chatLog.appendChild(wrapper);
  chatLog.scrollTop = chatLog.scrollHeight;
  return bubble;
};

const fetchChats = async () => {
  const response = await fetch('/api/chats');
  const payload = await response.json();
  renderChats(payload.chats || []);
  if (!currentChatId && payload.chats && payload.chats.length > 0) {
    loadChat(payload.chats[0].id);
  }
};

const createChat = async () => {
  const response = await fetch('/api/chats', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: 'New Chat',
      mode: modeSelect.value,
      context_text: ''
    })
  });
  const payload = await response.json();
  currentChatId = payload.id;
  await fetchChats();
  return currentChatId;
};

const loadChat = async (chatId) => {
  const response = await fetch(`/api/chats/${chatId}`);
  if (!response.ok) return;
  const payload = await response.json();
  currentChatId = payload.chat.id;
  chatTitle.textContent = payload.chat.title || 'Chat';
  modeSelect.value = payload.chat.mode || 'with_pdf';
  updateModeVisibility();
  uploadStatus.textContent = payload.chat.last_upload_name
    ? `Last upload: ${payload.chat.last_upload_name}`
    : 'No file selected';
  renderMessages(payload.messages || []);
  await fetchChats();
};

const sendMessage = async () => {
  if (!currentChatId) {
    await createChat();
  }
  const userText = messageInput.value.trim();
  if (!userText) {
    setStatus('Type a message first.');
    return;
  }

  setStatus('Processing...');
  appendBubble('user', userText);
  const pending = appendBubble('assistant', '...');

  const data = new FormData();
  data.append('input_text', userText);
  data.append('mode', modeSelect.value);
  if (fileInput.files[0] && modeSelect.value === 'with_pdf') {
    data.append('file', fileInput.files[0]);
  }

  const response = await fetch(`/api/chats/${currentChatId}/messages`, {
    method: 'POST',
    body: data
  });

  if (!response.ok) {
    const errorText = await response.text();
    pending.textContent = errorText || 'Request failed.';
    setStatus('Error sending message.');
    return;
  }

  const payload = await response.json();
  pending.innerHTML = renderAssistantContent(payload.output_text) || 'No response.';
  messageInput.value = '';
  setStatus('Ready');
  if (payload.upload_status && payload.upload_status.filename) {
    uploadStatus.textContent = `Uploaded: ${payload.upload_status.filename}`;
  }
  if (payload.chat && payload.chat.title) {
    chatTitle.textContent = payload.chat.title;
  }
  if (payload.messages) {
    renderMessages(payload.messages);
  } else {
    await loadChat(currentChatId);
  }
};

chatForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  await sendMessage();
});

newChatButton.addEventListener('click', async () => {
  currentChatId = null;
  chatLog.innerHTML = '';
  chatTitle.textContent = 'New Chat';
  await createChat();
});

modeSelect.addEventListener('change', updateModeVisibility);
updateModeVisibility();
fetchChats();
</script>
</body>
</html>
